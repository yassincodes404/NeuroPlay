<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Template Page</title>
    <style>
        body {
            font-family: 'Verdana', sans-serif;
            background-color: #fffbe6;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #ff6f61;
            color: white;
            padding: 20px;
            text-align: center;
        }
        main {
            padding: 30px;
        }
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
            padding: 25px;
            margin-bottom: 20px;
        }
        .card h2 {
            margin-top: 0;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #ffeded;
            color: #444;
        }
    </style>
</head>
<body>
    <header>
        <h1 th:text="'Hello, ' + ${username} + '!'">Hello, User!</h1>
    </header>
    <main>
        <div class="card" th:each="item : ${items}">
            <h2 th:text="${item.title}">Item Title</h2>
            <p th:text="${item.content}">Item Content</p>
        </div>
    </main>
    <footer>
        &copy; 2026 NeuroPlay Template Page
    </footer>
</body>
</html>
