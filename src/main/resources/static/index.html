<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Static Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4a90e2;
            color: white;
            padding: 20px;
            text-align: center;
        }
        main {
            padding: 30px;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h2 {
            margin-top: 0;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #eee;
            color: #555;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Static Page</h1>
    </header>
    <main>
        <div class="card">
            <h2>Card 1</h2>
            <p>This is some static content. It will never change unless you manually edit the HTML file.</p>
        </div>
        <div class="card">
            <h2>Card 2</h2>
            <p>Static content is perfect for resources that don’t need dynamic data.</p>
        </div>
    </main>
    <footer>
        &copy; 2026 NeuroPlay Static Page
    </footer>
</body>
</html>
